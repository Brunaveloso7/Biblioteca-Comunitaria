<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>   Biblioteca Comunitária </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
 
    <!-- MENU LATERAL -->
    <div class="menu">
 
        <h2>Biblioteca</h2>
        <button>Meus Livros</button>
        <button>Meus Pedidos</button>
        <button>Catálogo</button>
 
    </div>
 
 
    <!-- CONTEÚDO PRINCIPAL -->
    <div class="conteudo">
 
        <!-- TOPO -->
        <div class="topo">
 
            <h1>Sistema da Biblioteca</h1>
            <div class="pesquisa">
                <input type="text"placeholder="Procurar livros">
 
            </div>
 
        </div>
 
 
        <!-- LISTA DE LIVROS -->
        <div class="lista-livros">
 
            <!-- DOM CASMURRO -->
            <div class="livro">
                <img src="https://m.media-amazon.com/images/I/61x1ZHomWUL._SY522_.jpg">
                <h3>Dom Casmurro</h3>
                <div class="status"> Indisponível</div>
                <button class="botao"> Receber aviso </button>
 
            </div>
 
 
            <!-- PEQUENO PRINCIPE -->
            <div class="livro">
                <img src="https://upload.wikimedia.org/wikipedia/en/0/05/Littleprince.JPG">
                <h3>O Pequeno Príncipe</h3>
                <div class="status"> Disponível </div>
                <button class="botao"> Reservar </button>
 
            </div>
 
 
            <!-- HARRY POTTER -->
            <div class="livro">
                <img src="https://m.media-amazon.com/images/I/61jgm6ooXzL._SY522_.jpg">
                <h3> Harry Potter e a Pedra Filosofal </h3>
                <div class="status"> Disponível</div>
                <button class="botao"> Reservar </button>
 
            </div>
 
 
            <!-- PERCY JACKSON -->
            <div class="livro">
                <img src="https://i.ebayimg.com/images/g/1SMAAOSw32lYogx1/s-l960.webp">
                <h3> Percy Jackson e o Ladrão de Raios </h3>
                <div class="status"> Disponível </div>
                <button class="botao"> Reservar</button>
 
            </div>
        </div>
    </div>
</body>
</html>
