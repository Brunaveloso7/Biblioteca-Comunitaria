<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>   Biblioteca Comunitária </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
 
    <!-- MENU LATERAL -->
    <div class="menu">
 
        <h2>Biblioteca</h2>
        <button>Meus Livros</button>
        <button>Meus Pedidos</button>
        <button>Catálogo</button>
 
    </div>
 
 
    <!-- CONTEÚDO PRINCIPAL -->
    <div class="conteudo">
 
        <!-- TOPO -->
        <div class="topo">
 
            <h1>Sistema da Biblioteca</h1>
            <div class="pesquisa">
                <input type="text"placeholder="Procurar livros">
 
            </div>
 
        </div>
 
 
        <!-- LISTA DE LIVROS -->
        <div class="lista-livros">
 
            <!-- Naruto Gold Vol. 25 -->
            <div class="livro">
                <img src="https://d14d9vp3wdof84.cloudfront.net/image/589816272436/image_22stg2jdbh7id95hcdh46m2i0j/-S897-FWEBP">
                <h3>Naruto Gold Vol. 25</h3>
                <div class="status"> Indisponível</div>
                <button class="botao"> Receber aviso </button>
 
            </div>
 
 
            <!-- Beyond The Story -->
            <div class="livro">
                <img src="https://m.media-amazon.com/images/I/81fozPElIyL._UF1000,1000_QL80_.jpg">
                <h3> Beyond The Story </h3>
                <div class="status"> Disponível </div>
                <button class="botao"> Reservar </button>
 
            </div>
 
 
            <!-- O Horizonte Mora Em Um Dia Cinza -->
            <div class="livro">
                <img src="https://imgv2-1-f.scribdassets.com/img/word_document/720044759/original/8019ac30d4/1?v=1">
                <h3> O Horizonte Mora Em Um Dia Cinza </h3>
                <div class="status"> Disponível</div>
                <button class="botao"> Reservar </button>
 
            </div>
 
 
            <!-- Diário de Um Banana-->
            <div class="livro">
                <img src="https://m.media-amazon.com/images/I/71fWaI5myqL.jpg">
                <h3> Diário de Um Banana </h3>
                <div class="status"> Disponível </div>
                <button class="botao"> Reservar</button>
 
            </div>
        </div>
    </div>
</body>
</html>
